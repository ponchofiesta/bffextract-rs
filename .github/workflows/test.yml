name: Test

on: [push, pull_request]

jobs:
  test:
    name: Test for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - windows-2025
          - macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: cargo test
